name: Deploy to Production

on:
  push:
    branches:
      - master  # Auto-deploy when pushing to master branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST_IP }}
          username: ${{ secrets.SERVER_USER }} # e.g., root or ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            
            # The path where you cloned the repository on your VPS
            cd /var/www/AssetManager
            
            # Pull the latest changes from GitHub
            git pull origin master
            
            # Install dependencies (using pnpm as per project spec)
            # Corepack enables pnpm automatically in recent Node versions
            corepack enable pnpm
            pnpm install
            
            # Update database schema and push changes
            pnpm --filter @workspace/db run push
            
            # Build the frontend and backend libraries
            pnpm run build
            
            # Restart the unified PM2 process
            # We assume you started it initially like: 
            # pm2 start "npx tsx artifacts/api-server/src/index.ts" --name assetmanager
            pm2 restart assetmanager
            
            pm2 status

      - name: Deployment Successful
        if: success()
        run: echo "✅ Deployment successful! The server is running the latest code."

      - name: Deployment Failed
        if: failure()
        run: echo "❌ Deployment failed - Please check the Actions logs."
